apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cicd-app

  template:
    metadata:
      labels:
        app: cicd-app

    spec:
      containers:
      - name: cicd-app
        image: sn9729/cicd-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000