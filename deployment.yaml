apiVersion: apps/v1
kind: Deployment

metadata:
  name: cicd-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cicd-app

  template:
    metadata:
      labels:
        app: cicd-app

    spec:
      containers:
        - name: cicd-app
          image: cicd-app:1
          imagePullPolicy: Never
          ports:
            - containerPort: 5000