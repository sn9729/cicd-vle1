<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CI/CD Demo</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#141e30,#243b55);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    width:420px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

h1{
    color:#243b55;
}

p{
    color:#555;
}

.version{
    margin:20px 0;
    font-size:20px;
    font-weight:bold;
    color:#141e30;
}

button{
    padding:12px 24px;
    border:none;
    border-radius:10px;
    background:#243b55;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#141e30;
}
</style>
</head>

<body>

<div class="card">
    <h1>🚀 CI/CD Pipeline</h1>
    <p>Docker + Jenkins + Kubernetes Deployment</p>

    <div class="version">
        Version {{ version }}
    </div>

    <p>Updated: {{ updated }}</p>

    <button onclick="alert('Application Running Successfully!')">
        Check Status
    </button>
</div>

</body>
</html>
